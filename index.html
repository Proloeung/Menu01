
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bean & Brew - Order Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Playfair+Display:wght@700&display=swap');

        :root {
            --primary: #634832;
            --secondary: #967259;
            --accent: #dbc1ac;
            --bg: #fdfaf7;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: #38220f;
        }

        h1, .font-serif {
            font-family: 'Playfair Display', serif;
        }

        .coffee-card {
            background: white;
            border-radius: 28px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(99, 72, 50, 0.05);
            overflow: hidden;
        }

        .coffee-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 25px 50px -12px rgba(99, 72, 50, 0.15);
        }

        .image-container {
            width: 100%;
            height: 180px;
            background-color: #f3f4f6;
            position: relative;
            overflow: hidden;
        }

        .image-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(45deg, #f3e7e9 0%, #e3eeff 99%, #e3eeff 100%);
            font-size: 3rem;
        }

        .cart-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #ef4444;
            color: white;
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 99px;
            font-weight: bold;
            border: 2px solid white;
        }

        .category-pill.active {
            background-color: var(--primary);
            color: white;
            box-shadow: 0 10px 15px -3px rgba(99, 72, 50, 0.3);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--secondary); border-radius: 10px; }

        .hidden-scroll::-webkit-scrollbar { display: none; }
        
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        .animate-slide-up { animation: slideUp 0.3s ease-out; }
    </style>
</head>
<body class="min-h-screen pb-32">

    <!-- Top Navigation -->
    <header class="sticky top-0 z-40 bg-white/90 backdrop-blur-lg px-6 py-4 flex justify-between items-center border-b border-stone-100">
        <div>
            <h1 class="text-2xl font-bold text-stone-800">Bean & Brew</h1>
            <p class="text-[10px] tracking-widest text-stone-400 font-bold uppercase">Morningside Heights</p>
        </div>
        <button onclick="toggleCart()" class="relative p-3 bg-stone-50 rounded-2xl text-stone-700 hover:bg-stone-100 transition-colors">
            <i class="fa-solid fa-cart-shopping text-lg"></i>
            <span id="cart-count" class="cart-badge hidden">0</span>
        </button>
    </header>

    <!-- Category Selector -->
    <nav class="flex space-x-3 px-6 py-6 overflow-x-auto hidden-scroll">
        <button onclick="filterItems('all')" id="btn-all" class="category-pill active px-6 py-2.5 rounded-full whitespace-nowrap bg-white shadow-sm font-semibold transition-all">All</button>
        <button onclick="filterItems('espresso')" id="btn-espresso" class="category-pill px-6 py-2.5 rounded-full whitespace-nowrap bg-white shadow-sm font-semibold transition-all">Espresso</button>
        <button onclick="filterItems('cold')" id="btn-cold" class="category-pill px-6 py-2.5 rounded-full whitespace-nowrap bg-white shadow-sm font-semibold transition-all">Cold Brew</button>
        <button onclick="filterItems('pastry')" id="btn-pastry" class="category-pill px-6 py-2.5 rounded-full whitespace-nowrap bg-white shadow-sm font-semibold transition-all">Pastries</button>
    </nav>

    <!-- Main Content -->
    <main class="px-6 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8" id="menu-grid">
        <!-- Coffee items will be injected here -->
    </main>

    <!-- Customization Drawer -->
    <div id="custom-drawer" class="fixed inset-0 bg-black/60 z-50 hidden flex items-end sm:items-center justify-center backdrop-blur-sm">
        <div class="bg-white w-full max-w-lg rounded-t-[40px] sm:rounded-[40px] p-8 animate-slide-up max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-start mb-6">
                <div class="flex items-center gap-4">
                    <div id="custom-icon-box" class="text-4xl p-4 bg-stone-50 rounded-3xl">☕</div>
                    <div>
                        <h2 id="custom-name" class="text-2xl font-bold text-stone-800">Item Name</h2>
                        <p id="custom-price" class="text-lg font-semibold text-stone-600">$0.00</p>
                    </div>
                </div>
                <button onclick="closeCustomizer()" class="p-3 bg-stone-100 rounded-full hover:bg-stone-200 transition-colors">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>

            <div class="space-y-8">
                <div>
                    <p class="font-bold text-stone-800 mb-4 flex items-center gap-2">
                        <i class="fa-solid fa-cow text-stone-400"></i> Milk Choice
                    </p>
                    <div class="grid grid-cols-1 gap-3" id="milk-options">
                        <label class="flex items-center justify-between p-4 rounded-2xl border-2 border-stone-100 cursor-pointer transition-all has-[:checked]:border-stone-800 has-[:checked]:bg-stone-50">
                            <div class="flex items-center gap-3">
                                <input type="radio" name="milk" value="Whole" checked class="accent-stone-800 w-4 h-4">
                                <span class="font-medium">Whole Milk</span>
                            </div>
                            <span class="text-xs text-stone-400 uppercase font-bold">Standard</span>
                        </label>
                        <label class="flex items-center justify-between p-4 rounded-2xl border-2 border-stone-100 cursor-pointer transition-all has-[:checked]:border-stone-800 has-[:checked]:bg-stone-50">
                            <div class="flex items-center gap-3">
                                <input type="radio" name="milk" value="Oat" class="accent-stone-800 w-4 h-4">
                                <span class="font-medium">Oat Milk</span>
                            </div>
                            <span class="text-xs text-green-600 uppercase font-bold">+$0.50</span>
                        </label>
                    </div>
                </div>

                <div>
                    <p class="font-bold text-stone-800 mb-4 flex items-center gap-2">
                        <i class="fa-solid fa-cubes-stacked text-stone-400"></i> Sweetness Level
                    </p>
                    <div class="flex justify-between bg-stone-50 p-2 rounded-2xl">
                        <button class="sweet-btn flex-1 py-3 rounded-xl font-bold transition-all" onclick="setSweet(0)">0%</button>
                        <button class="sweet-btn flex-1 py-3 rounded-xl font-bold transition-all active bg-white shadow-sm" onclick="setSweet(50)">50%</button>
                        <button class="sweet-btn flex-1 py-3 rounded-xl font-bold transition-all" onclick="setSweet(100)">100%</button>
                    </div>
                </div>
            </div>

            <button id="add-to-cart-btn" class="w-full mt-10 bg-[#634832] text-white py-5 rounded-[24px] font-bold text-lg hover:bg-[#38220f] transition-all shadow-lg shadow-stone-200">
                Add to Order
            </button>
        </div>
    </div>

    <!-- Cart Sidebar -->
    <div id="cart-sidebar" class="fixed inset-y-0 right-0 w-full max-w-md bg-white shadow-2xl z-[60] transform translate-x-full transition-transform duration-500 cubic-bezier(0.4, 0, 0.2, 1) flex flex-col">
        <div class="p-8 border-b border-stone-50 flex justify-between items-center">
            <h2 class="text-2xl font-bold">Your Bag</h2>
            <button onclick="toggleCart()" class="w-10 h-10 flex items-center justify-center bg-stone-50 rounded-full hover:bg-stone-100">
                <i class="fa-solid fa-chevron-right text-stone-400"></i>
            </button>
        </div>
        
        <div id="cart-items" class="flex-1 overflow-y-auto p-8 space-y-6">
            <!-- Items injected here -->
        </div>

        <div class="p-8 border-t border-stone-100 bg-stone-50/50">
            <!-- Phone Number Input -->
            <div class="mb-6">
                <label for="phone-number" class="block text-xs font-bold text-stone-400 uppercase tracking-widest mb-2">Phone Number</label>
                <div class="relative">
                    <i class="fa-solid fa-phone absolute left-4 top-1/2 -translate-y-1/2 text-stone-300"></i>
                    <input type="tel" id="phone-number" placeholder="012 345 678" class="w-full bg-white border border-stone-100 py-4 pl-12 pr-4 rounded-2xl font-bold text-stone-800 outline-none focus:border-stone-800 transition-all">
                </div>
            </div>

            <div class="space-y-2 mb-8">
                <div class="flex justify-between pt-4">
                    <span class="text-lg font-bold">Total</span>
                    <span id="cart-total" class="text-xl font-bold text-stone-900">$0.00</span>
                </div>
            </div>
            <button onclick="checkout()" class="w-full bg-[#0088cc] text-white py-5 rounded-2xl font-bold hover:bg-[#0077b5] transition-all flex items-center justify-center gap-3 shadow-xl">
                <i class="fa-brands fa-telegram text-xl"></i>
                <span>Order via Telegram</span>
            </button>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-stone-900 text-white px-8 py-4 rounded-3xl shadow-2xl opacity-0 transition-all z-[100] pointer-events-none flex items-center gap-3">
        <i class="fa-solid fa-check-circle text-green-400"></i>
        <span class="font-bold">Added to your bag</span>
    </div>

    <script>
        // --- CONFIGURATION ---
        const TELEGRAM_USERNAME = "ReamProloeungbot"; 
        // ---------------------

        const inventory = [
            { id: 1, name: "Vanilla Latte", category: "espresso", price: 5.50, desc: "Double shot espresso with steamed milk and Madagascar vanilla.", icon: "☕", imgLabel: "Rich & Creamy" },
            { id: 2, name: "Honeycomb Cold Brew", category: "cold", price: 6.25, desc: "12-hour steep cold brew topped with local honeycomb crunch.", icon: "🧊", imgLabel: "Chilled Sweetness" },
            { id: 3, name: "Flat White", category: "espresso", price: 4.75, desc: "Micro-foamed milk poured over a ristretto shot.", icon: "🥛", imgLabel: "Velvety Texture" },
            { id: 4, name: "Pistachio Croissant", category: "pastry", price: 5.00, desc: "Flaky butter pastry filled with roasted pistachio cream.", icon: "🥐", imgLabel: "Golden Flaky" },
            { id: 5, name: "Iced Matcha Latte", category: "cold", price: 5.75, desc: "Ceremonial grade matcha whisked with honey and oat milk.", icon: "🍵", imgLabel: "Earthy Energy" },
            { id: 6, name: "Espresso Tonic", category: "espresso", price: 5.25, desc: "Sparkling tonic water with a double shot and citrus peel.", icon: "🍋", imgLabel: "Zesty & Bold" }
        ];

        let cart = [];
        let currentItem = null;
        let selectedSweetness = 50;

        function renderMenu(items) {
            const grid = document.getElementById('menu-grid');
            grid.innerHTML = items.map(item => `
                <div class="coffee-card flex flex-col">
                    <div class="image-container">
                        <div class="image-placeholder">
                            ${item.icon}
                        </div>
                        <div class="absolute bottom-4 left-4">
                            <span class="bg-white/90 backdrop-blur px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest text-stone-800 shadow-sm">
                                ${item.imgLabel}
                            </span>
                        </div>
                    </div>
                    <div class="p-6 flex flex-col flex-1">
                        <div class="flex justify-between items-start mb-2">
                            <h3 class="text-xl font-bold text-stone-800">${item.name}</h3>
                            <span class="font-bold text-stone-900">$${item.price.toFixed(2)}</span>
                        </div>
                        <p class="text-sm text-stone-500 leading-relaxed line-clamp-2 mb-6">${item.desc}</p>
                        <div class="mt-auto">
                            <button onclick="openCustomizer(${item.id})" class="w-full bg-stone-50 hover:bg-stone-100 text-stone-800 py-3 rounded-2xl font-bold transition-all flex items-center justify-center gap-2">
                                <i class="fa-solid fa-sliders text-xs"></i>
                                <span>Customize</span>
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function filterItems(cat) {
            document.querySelectorAll('.category-pill').forEach(btn => btn.classList.remove('active', 'bg-stone-800', 'text-white'));
            document.getElementById(`btn-${cat}`).classList.add('active', 'bg-stone-800', 'text-white');
            
            const filtered = cat === 'all' ? inventory : inventory.filter(i => i.category === cat);
            renderMenu(filtered);
        }

        function openCustomizer(id) {
            currentItem = inventory.find(i => i.id === id);
            document.getElementById('custom-name').innerText = currentItem.name;
            document.getElementById('custom-price').innerText = `$${currentItem.price.toFixed(2)}`;
            document.getElementById('custom-icon-box').innerText = currentItem.icon;
            document.getElementById('custom-drawer').classList.remove('hidden');
            
            document.getElementById('add-to-cart-btn').onclick = () => addToCart();
        }

        function closeCustomizer() {
            document.getElementById('custom-drawer').classList.add('hidden');
        }

        function setSweet(level) {
            selectedSweetness = level;
            document.querySelectorAll('.sweet-btn').forEach(btn => {
                btn.classList.remove('bg-white', 'shadow-sm');
                if(btn.innerText.includes(level)) btn.classList.add('bg-white', 'shadow-sm');
            });
        }

        function addToCart() {
            const milk = document.querySelector('input[name="milk"]:checked').value;
            const priceMod = milk === 'Oat' ? 0.50 : 0;
            
            const orderItem = {
                ...currentItem,
                customId: Date.now(),
                finalPrice: currentItem.price + priceMod,
                customization: { milk, sweetness: selectedSweetness }
            };

            cart.push(orderItem);
            updateCartUI();
            closeCustomizer();
            showToast();
        }

        function updateCartUI() {
            const count = document.getElementById('cart-count');
            const list = document.getElementById('cart-items');
            
            count.innerText = cart.length;
            count.classList.toggle('hidden', cart.length === 0);

            if (cart.length === 0) {
                list.innerHTML = `
                    <div class="text-center py-20">
                        <div class="w-20 h-20 bg-stone-50 rounded-full flex items-center justify-center mx-auto mb-6">
                            <i class="fa-solid fa-mug-hot text-3xl text-stone-200"></i>
                        </div>
                        <p class="text-stone-400 font-medium">Your bag is looking a bit empty.</p>
                    </div>
                `;
            } else {
                list.innerHTML = cart.map(item => `
                    <div class="flex gap-4 group">
                        <div class="w-16 h-16 bg-stone-100 rounded-2xl flex items-center justify-center text-2xl shrink-0">
                            ${item.icon}
                        </div>
                        <div class="flex-1">
                            <div class="flex justify-between mb-1">
                                <p class="font-bold text-stone-800">${item.name}</p>
                                <p class="font-bold text-stone-900">$${item.finalPrice.toFixed(2)}</p>
                            </div>
                            <p class="text-xs text-stone-400 font-medium">${item.customization.milk} milk • ${item.customization.sweetness}% sweet</p>
                            <button onclick="removeFromCart(${item.customId})" class="text-[10px] font-bold text-red-400 uppercase tracking-wider mt-2 hover:text-red-600 transition-colors">Remove</button>
                        </div>
                    </div>
                `).join('');
            }

            const subtotal = cart.reduce((sum, item) => sum + item.finalPrice, 0);
            document.getElementById('cart-total').innerText = `$${subtotal.toFixed(2)}`;
        }

        function removeFromCart(customId) {
            cart = cart.filter(i => i.customId !== customId);
            updateCartUI();
        }

        function toggleCart() {
            const sidebar = document.getElementById('cart-sidebar');
            sidebar.classList.toggle('translate-x-full');
        }

        function showToast() {
            const toast = document.getElementById('toast');
            toast.style.opacity = '1';
            toast.style.transform = 'translate(-50%, -20px)';
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translate(-50%, 0)';
            }, 2500);
        }

        function checkout() {
            const phoneInput = document.getElementById('phone-number');
            const phoneNumber = phoneInput.value.trim();

            if(cart.length === 0) return;
            
            if(!phoneNumber) {
                phoneInput.classList.add('border-red-400');
                phoneInput.focus();
                return;
            } else {
                phoneInput.classList.remove('border-red-400');
            }

            // Generate the Order Message for Telegram
            const total = cart.reduce((sum, item) => sum + item.finalPrice, 0).toFixed(2);
            let message = `☕ *NEW ORDER FROM BEAN & BREW*\n`;
            message += `📞 *Contact:* ${phoneNumber}\n\n`;
            
            cart.forEach((item, index) => {
                message += `${index + 1}. *${item.name}* ($${item.finalPrice.toFixed(2)})\n`;
                message += `   🥛 Milk: ${item.customization.milk}\n`;
                message += `   🍯 Sweetness: ${item.customization.sweetness}%\n\n`;
            });

            message += `💰 *TOTAL: $${total}*`;

            // Encode for URL
            const encodedMessage = encodeURIComponent(message);
            const telegramUrl = `https://t.me/${TELEGRAM_USERNAME}?text=${encodedMessage}`;

            // Redirect user to Telegram
            window.open(telegramUrl, '_blank');

            // Optional: Show Success UI in app
            const successModal = document.createElement('div');
            successModal.className = 'fixed inset-0 bg-stone-900 z-[200] flex flex-col items-center justify-center text-white p-8 text-center';
            successModal.innerHTML = `
                <div class="mb-8 w-24 h-24 bg-[#0088cc] rounded-full flex items-center justify-center animate-bounce">
                    <i class="fa-brands fa-telegram text-4xl"></i>
                </div>
                <h2 class="text-4xl font-bold mb-4 font-serif">Sending Order...</h2>
                <p class="text-stone-400 max-w-xs mb-10">We've opened Telegram to send your order details. Please confirm the message there so we have your phone number!</p>
                <button onclick="location.reload()" class="bg-white text-stone-900 px-10 py-4 rounded-2xl font-bold">Done</button>
            `;
            document.body.appendChild(successModal);
        }

        window.onload = () => renderMenu(inventory);
    </script>
</body>
</html>
